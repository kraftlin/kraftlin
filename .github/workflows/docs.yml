name: Publish Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/gradle-setup

      - name: Build KDoc
        run: ./gradlew dokkaGeneratePublicationHtml --no-daemon

      - name: Build MkDocs
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material
          mkdocs build -f docs/mkdocs.yml

      - name: Add KDoc and extra files to site
        run: |
          mkdir -p site/kdoc
          cp -r build/dokka/html/* site/kdoc/
          cp docs/googlea01f5090332f9149.html site/

      - name: Generate deploy token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DOCS_APP_ID }}
          private-key: ${{ secrets.DOCS_APP_PRIVATE_KEY }}
          owner: kraftlin
          repositories: kraftlin.github.io

      - name: Publish to kraftlin.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ steps.app-token.outputs.token }}
          external_repository: kraftlin/kraftlin.github.io
          publish_branch: main
          publish_dir: site
