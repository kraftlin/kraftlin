site_name: Kraftlin
site_url: https://kraftlin.github.io/kraftlin/
docs_dir: .
site_dir: ../site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.tabs.link

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Config: config.md
  - Command: command.md
  - Message: message.md
  - KDoc: kdoc/index.html
